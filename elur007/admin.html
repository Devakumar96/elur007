<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
   <script>
const password = prompt("Enter Admin Password");

if (!password || password !== "MyElur@2026") {
    alert("Access Denied");
    window.location.href = "index.html";
}
</script>
</head>
<body>

<div class="container mt-4">

    <h2>Complaint Dashboard</h2>
    <div class="row mb-4">

    <div class="col-md-3 mb-3">
        <div class="card text-center">
            <div class="card-body">
                <h5>Total</h5>
                <h2 id="totalCount">0</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3 mb-3">
        <div class="card text-center">
            <div class="card-body">
                <h5>Pending</h5>
                <h2 id="pendingCount">0</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3 mb-3">
        <div class="card text-center">
            <div class="card-body">
                <h5>In Progress</h5>
                <h2 id="progressCount">0</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3 mb-3">
        <div class="card text-center">
            <div class="card-body">
                <h5>Resolved</h5>
                <h2 id="resolvedCount">0</h2>
            </div>
        </div>
    </div>

</div>
    <table class="table table-bordered">

        <thead>
            <tr>
                <th>ID</th>
                <th>Category</th>
                <th>Street</th>
                <th>Status</th>
                <th>Update</th>
            </tr>
        </thead>

        <tbody id="complaintsTable">
        </tbody>

    </table>

</div>

<script type="module" src="js/admin.js"></script>

<!-- Complaint Details Modal -->

<div class="modal fade"
     id="complaintModal"
     tabindex="-1">

  <div class="modal-dialog">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title">
          Complaint Details
        </h5>

        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal">
        </button>

      </div>

      <div class="modal-body">

        <p><strong>ID:</strong>
           <span id="modalComplaintId"></span>
        </p>

        <p><strong>Category:</strong>
           <span id="modalCategory"></span>
        </p>

        <p><strong>Street:</strong>
           <span id="modalStreet"></span>
        </p>

        <p><strong>Mobile:</strong>
           <span id="modalMobile"></span>
        </p>

        <p><strong>Status:</strong>
           <span id="modalStatus"></span>
        </p>

        <p><strong>Description:</strong></p>

        <div class="border rounded p-2"
             id="modalDescription">
        </div>

        <br>

        <p><strong>Created At:</strong>
           <span id="modalCreatedAt"></span>
        </p>

      </div>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
