<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
   content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard - MyElur</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>


@media(max-width:768px){

    h2{
        font-size:1.4rem;
    }

    .card-body h2{
        font-size:1.5rem;
    }

    .btn{
        font-size:14px;
    }

}
.mobile-complaint-card{
    background: var(--card-bg);
    border-radius:16px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.mobile-complaint-card h6{
    color:var(--pumpkin-spice);
    font-weight:700;
}

.mobile-status{
    display:inline-block;
    padding:5px 10px;
    border-radius:20px;
    font-size:.85rem;
    font-weight:600;
}

.mobile-pending{
    background:#fff3cd;
}

.mobile-progress{
    background:#cfe2ff;
}

.mobile-resolved{
    background:#d1e7dd;
}

</style>

</head>

<body>

<!-- Login Modal -->

<div class="modal fade"
     id="loginModal"
     data-bs-backdrop="static"
     data-bs-keyboard="false"
     tabindex="-1">


<div class="modal-dialog modal-dialog-centered">

    <div class="modal-content">

        <div class="modal-header">

            <h5 class="modal-title">
                🔒 Admin Login
            </h5>

        </div>

        <div class="modal-body">

            <input type="password"
                   id="adminPassword"
                   class="form-control"
                   placeholder="Enter Admin Password">

            <div id="loginError"
                 class="text-danger mt-2">
            </div>

        </div>

        <div class="modal-footer">

            <button
                type="button"
                id="loginBtn"
                class="btn btn-primary">

                Login

            </button>

        </div>

    </div>

</div>


</div>

<!-- Dashboard -->

<div class="container py-4">


<div class="d-flex justify-content-between align-items-center mb-4">

    <h2>
        Complaint Dashboard
    </h2>

    <a href="index.html"
       class="btn btn-outline-secondary">

        ← Back to Home

    </a>

</div>

<!-- Statistics -->

<div class="row mb-4">

    <div class="col-lg-3 col-md-6 mb-3">

        <div class="card stats-card total-card">

            <div class="card-body text-center">

                <h5>Total</h5>

                <h2 id="totalCount">0</h2>

            </div>

        </div>

    </div>

    <div class="col-lg-3 col-md-6 mb-3">

        <div class="card stats-card pending-card">

            <div class="card-body text-center">

                <h5>Pending</h5>

                <h2 id="pendingCount">0</h2>

            </div>

        </div>

    </div>

    <div class="col-lg-3 col-md-6 mb-3">

        <div class="card stats-card progress-card">

            <div class="card-body text-center">

                <h5>In Progress</h5>

                <h2 id="progressCount">0</h2>

            </div>

        </div>

    </div>

    <div class="col-lg-3 col-md-6 mb-3">

        <div class="card stats-card resolved-card">

            <div class="card-body text-center">

                <h5>Resolved</h5>

                <h2 id="resolvedCount">0</h2>

            </div>

        </div>

    </div>

</div>

<!-- Complaints Table -->
<div id="mobileComplaints"
     class="d-block d-md-none">
</div>
<div class="card shadow-sm dashboard-table-card">

    <div class="card-body">

        <div class="table-container d-none d-md-block">

            <table class="table table-bordered table-hover">

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Category</th>
                        <th>Street</th>
                        <th>Status</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="complaintsTable">

                </tbody>

            </table>

        </div>

    </div>

</div>


</div>

<!-- Complaint Details Modal -->

<div class="modal fade"
     id="complaintModal"
     tabindex="-1">


<div class="modal-dialog">

    <div class="modal-content">

        <div class="modal-header">

            <h5 class="modal-title">

                Complaint Details

            </h5>

            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
            </button>

        </div>

        <div class="modal-body">

            <p>
                <strong>ID:</strong>
                <span id="modalComplaintId"></span>
            </p>

            <p>
                <strong>Category:</strong>
                <span id="modalCategory"></span>
            </p>

            <p>
                <strong>Street:</strong>
                <span id="modalStreet"></span>
            </p>

            <p>
                <strong>Mobile:</strong>
                <span id="modalMobile"></span>
            </p>

            <p>
                <strong>Status:</strong>
                <span id="modalStatus"></span>
            </p>

            <p>
                <strong>Description:</strong>
            </p>

            <div class="border rounded p-3"
                 id="modalDescription">
            </div>

            <hr>

            <p>
                <strong>Created At:</strong>
                <span id="modalCreatedAt"></span>
            </p>

        </div>

    </div>

</div>


</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script>

document.addEventListener("DOMContentLoaded", () => {

    const loginModal =
        new bootstrap.Modal(
            document.getElementById("loginModal")
        );

    loginModal.show();

    document
        .getElementById("loginBtn")
        .addEventListener("click", () => {

            const password =
                document.getElementById(
                    "adminPassword"
                ).value;

            if(password === "MyElur@2026"){

                loginModal.hide();

            }else{

                document.getElementById(
                    "loginError"
                ).innerHTML =
                "❌ Incorrect Password";

            }

        });

});

</script>

<script type="module" src="js/admin.js"></script>

</body>
</html>
